services:

  wdk-service:
    build:
      context: wdk_service
      dockerfile: Dockerfile
    container_name: atlas-wdk
    ports:
      - "3001:3001"
    environment:
      - WDK_SERVICE_PORT=3001
      - WDK_SEED_PHRASE=${WDK_SEED_PHRASE:-}
      - EVM_PROVIDER=${EVM_PROVIDER:-https://eth.drpc.org}
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: atlas-api
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WALLET_ADDRESS=${WALLET_ADDRESS:-0x0000000000000000000000000000000000000000}
      - DEFI_LLAMA_BASE_URL=${DEFI_LLAMA_BASE_URL:-https://api.llama.fi}
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=sqlite:////data/atlas.db
      - WDK_SERVICE_URL=http://wdk-service:3001
      - INITIAL_PORTFOLIO_USDT=${INITIAL_PORTFOLIO_USDT:-100000}
    depends_on:
      - wdk-service
    volumes:
      - atlas-data:/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: atlas/dashboard/frontend
      dockerfile: Dockerfile.frontend
    container_name: atlas-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  atlas-data:
